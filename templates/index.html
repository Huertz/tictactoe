<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #0d0d14;
      --surface:      rgba(255, 255, 255, 0.04);
      --border:       rgba(255, 255, 255, 0.08);
      --accent-x:     #7c3aed;
      --accent-o:     #06b6d4;
      --accent-x-glow: rgba(124, 58, 237, 0.35);
      --accent-o-glow: rgba(6, 182, 212, 0.35);
      --text-primary: #f1f5f9;
      --text-muted:   #64748b;
      --radius-cell:  16px;
      --radius-pill:  100px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: var(--text-primary);
      padding: 1.5rem;
    }

    .app {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent-x) 0%, var(--accent-o) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Tic&#8209;Tac&#8209;Toe</h1>
    <!-- components added in Tasks 2–8 -->
  </div>

  <div aria-live="assertive" class="sr-only" id="announce"></div>

  <script>
    // JS added in Tasks 2–8
  </script>
</body>
</html>
